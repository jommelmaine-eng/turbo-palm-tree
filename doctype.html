<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProAnalysis Studio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }body {
  background: linear-gradient(135deg, #000000, #1e1e1e);
  color: white;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.container {
  width: 90%;
  max-width: 900px;
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  border-radius: 30px;
  padding: 40px;
  text-align: center;
  box-shadow: 0 0 40px rgba(255,255,255,0.1);
}

.logo {
  font-size: 3rem;
  font-weight: bold;
  color: #ffd700;
  text-shadow: 0 0 15px #ffd700;
  margin-bottom: 10px;
}

.subtitle {
  color: #ddd;
  font-size: 1.2rem;
  margin-bottom: 30px;
}

.video-box {
  width: 100%;
  height: 350px;
  border-radius: 25px;
  overflow: hidden;
  border: 3px solid #ffd700;
  box-shadow: 0 0 25px rgba(255,215,0,0.5);
  margin-bottom: 25px;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.btn {
  display: inline-block;
  padding: 15px 35px;
  background: #ffd700;
  color: black;
  border-radius: 50px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s ease;
  margin-top: 15px;
}

.btn:hover {
  transform: scale(1.05);
  background: white;
}

.music {
  margin-top: 20px;
  color: #ffcc00;
  font-size: 1rem;
}

.footer {
  margin-top: 35px;
  color: #aaa;
  font-size: 0.9rem;
}

  </style>
</head>
<body>
  <div class="container">
    <div class="logo">ProAnalysis Studio</div>
    <div class="subtitle">TikTok Style Singing Video Website</div><div class="video-box">
  <video autoplay muted loop controls>
    <source src="rather_be_updated_edit.mp4" type="video/mp4">
  </video>
</div>

<div class="music">
  🎵 Song: Rather Be — Clean Bandit ft. Jess Glynne
</div>

<a href="#" class="btn">Upload New Video</a>

<div class="footer">
  studio-pro-camerafeslisve.chatgpg.com/ProAnalysis
</div>

  </div>
</body>
  </html>
